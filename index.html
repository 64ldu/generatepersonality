<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #0f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .cipher-code {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 12px;
            text-shadow: 0 0 20px #0f0;
            animation: pulse 2s infinite;
            margin-bottom: 60px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .copy-btn {
            background: transparent;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 12px 24px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        
        .copy-btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }
        
        .copy-btn.copied {
            background: #0f0;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="cipher-code" id="cipherCode">
        LOADING...
    </div>
    
    <button class="copy-btn" id="copyBtn" onclick="copyCipher()">
        COPY
    </button>

    <script>
        let cipherMapLink = '';
        
        // Shift letters by 1 (A→B, B→C, Z→A)
        function shiftLetters(text, shift = 1) {
            return text.replace(/[a-zA-Z]/g, char => {
                const code = char.charCodeAt(0);
                const isUpperCase = code >= 65 && code <= 90;
                const isLowerCase = code >= 97 && code <= 122;
                
                if (isUpperCase) {
                    return String.fromCharCode(((code - 65 + shift) % 26) + 65);
                } else if (isLowerCase) {
                    return String.fromCharCode(((code - 97 + shift) % 26) + 97);
                }
                return char;
            });
        }

        async function generateCipher() {
            try {
                // Get location
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    });
                });

                const { latitude, longitude } = position.coords;
                
                // Create Google Maps link
                const originalMapLink = `https://www.google.com/maps?q=${latitude},${longitude}`;
                
                // Create cipher by shifting letters
                cipherMapLink = shiftLetters(originalMapLink);
                
                // Display only the cipher
                document.getElementById('cipherCode').textContent = cipherMapLink;
                
                // Store for decryption
                localStorage.setItem('cipher_' + cipherMapLink, JSON.stringify({
                    original: originalMapLink,
                    cipher: cipherMapLink,
                    location: { latitude, longitude }
                }));

            } catch (error) {
                document.getElementById('cipherCode').textContent = 'ERROR';
            }
        }

        function copyCipher() {
            if (!cipherMapLink) return;
            
            navigator.clipboard.writeText(cipherMapLink).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = 'COPIED!';
                btn.classList.add('copied');
                
                setTimeout(() => {
                    btn.textContent = 'COPY';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Auto-generate on page load
        window.addEventListener('load', generateCipher);
    </script>
</body>
</html>
